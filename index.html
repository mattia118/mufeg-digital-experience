<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUFEG - Experience Digitale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <style>
        :root {
            --oro-grano: #daa520;
            --marrone-scuro: #3e2723;
            --crema: #fffdf5;
        }

        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', sans-serif; background: var(--crema); color: var(--marrone-scuro); scroll-behavior: smooth; }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1542711874-972740924195?auto=format&fit=crop&q=80&w=1920'); /* Foto temporanea grano */
            background-size: cover;
            color: white;
            text-align: center;
        }

        header h1 { font-size: 4rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .btn { padding: 15px 30px; background: var(--oro-grano); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); background: #b8860b; }

        /* Section 3D */
        #interactive-3d {
            height: 80vh;
            position: relative;
            background: #eee;
            border-top: 5px solid var(--oro-grano);
        }

        #ui-overlay {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            pointer-events: none;
        }

        footer { padding: 50px; text-align: center; background: var(--marrone-scuro); color: white; }
    </style>
</head>
<body>

    <header>
        <h1>MUFEG</h1>
        <p>Museo di Comunità della Festa del Grano - Jelsi</p>
        <br>
        <a href="#interactive-3d" class="btn">Esplora la Traglia 3D</a>
    </header>

    <section id="interactive-3d">
        <div id="ui-overlay">
            <h3>Esploratore 3D</h3>
            <p>Traglia Tradizionale di Jelsi.<br><small>Usa il mouse per ruotare e la rotellina per zoomare.</small></p>
        </div>
        </section>

    <footer>
        <p>&copy; 2026 - Progetto Digitale per il Comune di Jelsi</p>
    </footer>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Setup base
        const container = document.getElementById('interactive-3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Controlli per muovere la visuale col mouse
        const controls = new OrbitControls(camera, renderer.domElement);
        
        // Luci
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Creiamo una struttura che ricorda una slitta (Traglia) semplificata
        const group = new THREE.Group();

        // Base Slitta
        const baseGeo = new THREE.BoxGeometry(4, 0.2, 2);
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const base = new THREE.Mesh(baseGeo, woodMat);
        group.add(base);

        // Carico di Grano (una piramide dorata sopra)
        const grainGeo = new THREE.ConeGeometry(1.5, 3, 4);
        const grainMat = new THREE.MeshStandardMaterial({ color: 0xdaa520 });
        const grain = new THREE.Mesh(grainGeo, grainMat);
        grain.position.y = 1.6;
        group.add(grain);

        scene.add(group);
        camera.position.set(5, 5, 5);
        controls.update();

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005; // Rotazione lenta automatica
            renderer.render(scene, camera);
        }
        
        // Gestione ridimensionamento finestra
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
